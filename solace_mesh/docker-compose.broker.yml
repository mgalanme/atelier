# Self-hosted, free, open source Solace PubSub+ Standard broker.
#
# nofile en 2448:1048576 es el mínimo documentado por Solace; el broker
# se apaga solo si el límite hard es inferior a 1048576.
#
# Si Docker Hub rate limiting es un problema al hacer pull de
# solace/solace-pubsub-standard, la misma imagen está en
# mirror.gcr.io/solace/solace-pubsub-standard.
services:
  solace-broker:
    image: solace/solace-pubsub-standard:latest
    shm_size: 1g
    ulimits:
      core: -1
      nofile:
        soft: 2448
        hard: 1048576
    ports:
      - "8080:8080"   # SEMP management (HTTP)
      - "55555:55555" # SMF (native messaging)
      - "8008:8008"   # WebSocket messaging
      - "1883:1883"   # MQTT
    environment:
      - username_admin_globalaccesslevel=admin
      - username_admin_password=${SOLACE_PASSWORD:-admin}
    volumes:
      - solace-data:/var/lib/solace

volumes:
  solace-data:
