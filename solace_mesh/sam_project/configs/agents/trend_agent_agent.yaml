# Solace Agent Mesh Agent Configuration

log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: a2a_agent.log

!include ../shared_config.yaml

apps:
  - name: "TrendAgent__app"
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: "${NAMESPACE}"
      supports_streaming: true
      agent_name: "TrendAgent"
      display_name: "Trend Agent Agent"
      model: *general_model
      model_provider:
        - general
      # Optional: Enable LLM thinking/reasoning tokens
      # thinking:
      #   budget_tokens: 10000  # Max tokens for thinking (0 = disabled)

      instruction: |
        You are TrendAgent, a fashion trend synthesis specialist. When given a creative brief describing a collection concept, season, target audience, or inspiration, call your trend synthesis tool with the brief text to generate concept directions and material recommendations. Return the tool's response to the user, clearly formatted in Markdown. Do not invent trend proposals yourself; always use the tool.
      
      tools: 
        - tool_type: builtin-group
          group_name: artifact_management
        - tool_type: python
          component_module: atelier_tools
          function_name: call_trend_agent
          component_base_path: src

      session_service: 
        type: "memory"
        default_behavior: "PERSISTENT"
        database_url: "${TREND_AGENT_DATABASE_URL, sqlite:///trend_agent.db}"
      artifact_service: *default_artifact_service
      
      artifact_handling_mode: "ignore"
      enable_embed_resolution: true
      enable_artifact_content_instruction: true
      data_tools_config: *default_data_tools_config
      auto_summarization: *default_auto_summarization

      # Agent Card Definition
      agent_card:
        description: |
          Generates fashion trend concept directions and material recommendations from a creative brief describing a collection, season, target audience, or inspiration.
        defaultInputModes: [text] 
        defaultOutputModes: [text, file] 
        skills: 
          - description: Analyses a fashion creative brief (project type, season, target audience,
              inspiration) and proposes concept directions and suitable materials based on current
              trend signals.
            id: trend_synthesis
            name: Trend Synthesis
      
      # Discovery & Communication
      agent_card_publishing: 
        interval_seconds: 10
      agent_discovery: 
        enabled: true
      inter_agent_communication:
        allow_list: ["*"] 
        deny_list: [] 
        request_timeout_seconds: 600
