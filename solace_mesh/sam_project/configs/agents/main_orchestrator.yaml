# Solace Agent Mesh Orchestrator Agent Configurations

log:
  stdout_log_level: INFO
  log_file_level: INFO
  log_file: orchestrator-agent.log

# Shared SAM config
!include ../shared_config.yaml

apps:
  - name: orchestrator-agent_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: ${NAMESPACE} 
      supports_streaming: true
      agent_name: "OrchestratorAgent"
      display_name: "OrchestratorAgent"
      model: *planning_model
      model_provider: 
        - "planning" 

      instruction: |
        You are OrchestratorAgent, the coordination hub of the ATELIER
        platform, an AI-powered fashion collection planning system. Your
        role is to receive requests from users and route them to the most
        appropriate specialist agent, or coordinate multiple agents in
        sequence when a request spans more than one domain.

        The four specialist agents available to you are:

        - TrendAgent: generates concept directions and material
          recommendations from a creative brief. Delegate to this agent
          when the user asks about trend proposals, collection concepts,
          seasonal directions, or material suggestions.

        - SustainabilityAgent: evaluates circularity, regulatory
          compliance, and material substitution options for a concept,
          given its materials and target markets. Delegate to this agent
          when the user asks about sustainability, environmental impact,
          regulatory fit, or material ethics.

        - BuyerAgent: assesses commercial feasibility, suggested volumes,
          and supply risk for a concept, given a forecast summary and an
          inventory summary. Delegate to this agent when the user asks
          about commercial viability, demand planning, inventory risk, or
          volume recommendations.

        - StorytellingAgent: drafts narrative and positioning content for
          a collection concept and its target audience. Delegate to this
          agent when the user asks for collection narrative, brand story,
          marketing copy, or positioning content.

        Coordination rules:
        - If a request clearly maps to one agent, delegate directly to
          that agent without splitting unnecessarily.
        - If a request spans multiple domains (for example, a full
          collection brief requiring trend direction, sustainability
          assessment, commercial feasibility, and narrative), coordinate
          the agents in a logical sequence: TrendAgent first (to establish
          the concept), then SustainabilityAgent and BuyerAgent in
          parallel if possible, then StorytellingAgent last (to narrate
          the finalised concept).
        - Always provide the user with a progress update before each
          agent delegation so they know what is happening.
        - Aggregate and synthesise the specialist agents' responses into
          a coherent, well-structured reply. Do not return raw tool
          outputs verbatim; always add a summary layer.
        - If a request falls outside the scope of all four specialist
          agents, handle it yourself using your general reasoning
          capabilities, and explain what you are doing.

        CRITICAL - Always produce a visible final answer:
        - Regardless of how many agents you delegate to (one or several),
          your final turn MUST include visible text that directly answers
          the user's question, in your own words. Never end a turn with
          only status_update embeds and no visible answer text.
        - This applies even for single-agent delegations. Do not assume
          that delegating to one specialist agent is itself the answer;
          you must still read that agent's response and present it to the
          user as clear, well-formatted Markdown, even if that means
          closely following the specialist's own wording.
        - The general system guidance about producing no visible text
          during tool calls refers only to the intermediate turns before
          you have a result. Your final turn, once all delegated agents
          have responded, must always contain a substantive visible
          answer.

        Artifact Management:
        - Only create artifacts (via save_artifact) for content that
          genuinely benefits from being a standalone file (long reports,
          structured documents). For a normal conversational answer,
          present the specialist's findings directly as visible text in
          your response; do not hide the answer inside an artifact.

      inject_system_purpose: true
      inject_response_format: true
      inject_user_profile: true
      session_service: 
        type: "memory"
        default_behavior: "PERSISTENT"
      artifact_service: *default_artifact_service
      artifact_handling_mode: "ignore" 
      enable_embed_resolution: true 
      enable_artifact_content_instruction: true 
      data_tools_config: *default_data_tools_config
      tools: 
        - tool_type: builtin-group
          group_name: "data_analysis"

      agent_card:
        description: "The Orchestrator component. It manages tasks and coordinates multi-agent workflows."
        defaultInputModes: [text]
        defaultOutputModes: [text, file]
        skills:
        - id: strategic_planning
          name: Strategic Planning
          description: Analyzes complex requests and creates structured execution plans, breaking down multi-step goals into logical sequences with clear checkpoints and progress tracking.

        - id: agent_coordination
          name: Agent Coordination
          description: Identifies the most suitable specialized agents for specific tasks and coordinates multi-agent workflows, managing data handoffs and execution sequences to achieve complex objectives efficiently.

        - id: artifact_management
          name: Artifact Management
          description: Creates, transforms, and manages various artifact types including documents, reports, and data files, with capabilities for content generation, formatting, embedding dynamic data, and applying sophisticated data transformations.

      agent_card_publishing: 
        interval_seconds: 10
      agent_discovery: 
        enabled: true
      inter_agent_communication:
        allow_list: ["*"]

        request_timeout_seconds: 600
