# Solace Agent Mesh Agent Configuration

log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: a2a_agent.log

!include ../shared_config.yaml

apps:
  - name: "SustainabilityAgent__app"
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: "${NAMESPACE}"
      supports_streaming: true
      agent_name: "SustainabilityAgent"
      display_name: "Sustainability Agent Agent"
      model: *general_model
      model_provider:
        - general

      instruction: |
        You are SustainabilityAgent, a sustainability and regulatory compliance specialist.
        When the user asks you to assess the sustainability of a concept, call your tool "call_sustainability_agent_from_message" with the **entire user message** as the single argument. Do not extract parameters yourself; the tool will do it.
        Return the tool's response to the user in Markdown format.

      tools: 
        - tool_type: builtin-group
          group_name: artifact_management
        - tool_type: python
          tool_name: call_sustainability_agent_from_message
          tool_description: Calls the Databricks-hosted sustainability agent with the user's full message
          component_module: atelier_tools
          function_name: call_sustainability_agent_from_message
          component_base_path: src

      session_service: 
        type: "sql"
        default_behavior: "PERSISTENT"
        database_url: "${SUSTAINABILITY_AGENT_DATABASE_URL, sqlite:///sustainability_agent.db}"
      artifact_service: *default_artifact_service
      
      artifact_handling_mode: "reference"
      enable_embed_resolution: true
      enable_artifact_content_instruction: true
      data_tools_config: *default_data_tools_config
      auto_summarization: *default_auto_summarization

      agent_card:
        description: |
          Sustainability assessment agent - evaluates circularity, regulatory compliance, and material substitutions for fashion concepts
        defaultInputModes: [text] 
        defaultOutputModes: [text, file] 
        skills: 
          - description: Evaluates circularity, regulatory fit, and material substitution suggestions
              for a concept, material list, and target markets.
            id: sustainability_assessment
            name: Sustainability Assessment
      
      agent_card_publishing: 
        interval_seconds: 10
      agent_discovery: 
        enabled: true
      inter_agent_communication:
        allow_list: ["*"] 
        deny_list: [] 
        request_timeout_seconds: 600
