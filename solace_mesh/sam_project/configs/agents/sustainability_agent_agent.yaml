# Solace Agent Mesh Agent Configuration

log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: a2a_agent.log

!include ../shared_config.yaml

apps:
  - name: "SustainabilityAgent__app"
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: "${NAMESPACE}"
      supports_streaming: true
      agent_name: "SustainabilityAgent"
      display_name: "Sustainability Agent Agent"
      model: *general_model
      model_provider:
        - general

      instruction: |
        You are SustainabilityAgent, a sustainability and regulatory compliance
        specialist. When given a fashion concept to assess, extract the concept
        description, its materials, and its target markets from the user's
        message, then call your sustainability assessment tool with those three
        structured arguments. If the user does not mention materials or target
        markets explicitly, use reasonable defaults and state your assumption.
        Return the tool's response to the user, clearly formatted in Markdown.
        Do not invent an assessment yourself; always use the tool.

      tools:
        - tool_type: builtin-group
          group_name: artifact_management
        - tool_type: python
          component_module: atelier_tools
          function_name: call_sustainability_agent
          component_base_path: src

      session_service:
        type: "sql"
        default_behavior: "PERSISTENT"
        database_url: "${SUSTAINABILITY_AGENT_DATABASE_URL, sqlite:///sustainability_agent.db}"
      artifact_service: *default_artifact_service

      artifact_handling_mode: "ignore"
      enable_embed_resolution: true
      enable_artifact_content_instruction: true
      data_tools_config: *default_data_tools_config
      auto_summarization: *default_auto_summarization

      agent_card:
        description: |
          Evaluates circularity, regulatory compliance, and material substitutions
          for fashion concepts, given a concept description, its materials, and
          its target markets.
        defaultInputModes: [text]
        defaultOutputModes: [text, file]
        skills:
          - description: Evaluates circularity, regulatory fit, and material substitution
              suggestions for a concept, material list, and target markets.
            id: sustainability_assessment
            name: Sustainability Assessment

      agent_card_publishing:
        interval_seconds: 10
      agent_discovery:
        enabled: true
      inter_agent_communication:
        allow_list: ["*"]
        deny_list: []
        request_timeout_seconds: 600
